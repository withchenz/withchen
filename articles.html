  <link href="https://fonts.loli.net/css2?family=Caveat:wght@400;600&family=Noto+Sans+SC:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:      #74B9E8;
      --blue-deep: #4A9BD4;
      --blue-lt:   #D0E9F7;
      --cream:     #F7F3EC;
      --ink:       #2C2C2C;
      --dark:      #1A1A1A;
      --dark2:     #232323;
      --dark3:     #2E2E2E;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream); color: var(--ink);
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      font-weight: 300; overflow-x: hidden;
    }

    /* ── TOP NAV ── */
    nav.top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 40;
      padding: 1.25rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--ink); text-decoration: none; opacity: 0.55; transition: opacity 0.2s; }
    .nav-logo:hover { opacity: 0.9; }
    .nav-back  { font-size: 0.75rem; color: var(--ink); text-decoration: none; opacity: 0.35; letter-spacing: 0.15em; transition: opacity 0.2s; }
    .nav-back:hover { opacity: 0.7; }

    /* ══════════════════════════════════════
       HERO
    ══════════════════════════════════════ */
    .hero {
      background: #EAE4DB;
      padding: 6rem 0 0;
      min-height: 88vh;
      display: flex; flex-direction: column; justify-content: center;
      position: relative; overflow: hidden;
    }
    /* Star decorations */
    .hero-stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .hstar { position: absolute; font-family: sans-serif; user-select: none; line-height: 1; }
    /* Wave divider */
    .hero-wave { position: absolute; bottom: -1px; left: 0; width: 100%; pointer-events: none; }
    .hero-wave svg { display: block; width: 100%; height: 64px; }
    .hero-inner {
      max-width: 960px; margin: 0 auto; padding: 0 1.75rem;
      position: relative; z-index: 1;
      text-align: center;
    }
    .chapter-tag {
      font-family: 'Caveat', cursive; font-size: 0.82rem; font-weight: 600;
      color: var(--blue); letter-spacing: 0.12em;
      display: block; margin-bottom: 0.45rem;
    }
    .hero-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(2.2rem, 7vw, 3.4rem);
      font-weight: 600; color: var(--ink);
      line-height: 1.2; margin-bottom: 0.38rem;
      min-height: 1.35em;
    }
    .hero-title:not(.typed)::after {
      content: '|'; color: var(--blue); margin-left: 2px;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .hero-sub {
      font-size: 0.73rem; color: rgba(44,44,44,0.38);
      letter-spacing: 0.18em; margin-bottom: 2.6rem;
    }

    /* ══════════════════════════════════════
       FAN CAROUSEL
    ══════════════════════════════════════ */
    .carousel-wrap {
      position: relative; margin: 0 auto; max-width: 820px;
      user-select: none;
    }
    .carousel-stage {
      position: relative; height: 500px;
      display: flex; align-items: center; justify-content: center;
    }
    .fc {
      position: absolute;
      width: 300px;
      border-radius: 18px; overflow: hidden;
      cursor: pointer;
      transition:
        transform  0.44s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        opacity    0.44s ease,
        box-shadow 0.44s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .fc[data-pos="center"] {
      transform: translateX(0) rotate(0deg) scale(1);
      z-index: 3; opacity: 1;
      box-shadow: 0 14px 50px rgba(0,0,0,0.55);
    }
    .fc[data-pos="left"] {
      transform: translateX(-248px) rotate(-13deg) scale(0.83);
      z-index: 1; opacity: 0.62;
    }
    .fc[data-pos="right"] {
      transform: translateX(248px) rotate(13deg) scale(0.83);
      z-index: 1; opacity: 0.62;
    }
    .fc[data-pos="hidden"] {
      transform: translateX(0) rotate(0deg) scale(0.72);
      z-index: 0; opacity: 0; pointer-events: none;
    }
    .fc-img {
      width: 100%; height: 300px;
      background: #D8D2C8; overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .fc-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .fc-placeholder {
      width:100%; height:100%;
      background: linear-gradient(135deg, #ccc6bc 0%, #d4cec4 100%);
      display:flex; align-items:center; justify-content:center;
    }
    .fc-placeholder span {
      font-family: 'Caveat', cursive; font-size: 2.8rem;
      color: rgba(44,44,44,0.1);
    }
    .fc-body { background: #fff; padding: 0.82rem 1rem 1rem; }
    .fc-badge {
      font-size: 0.6rem; font-weight: 400;
      background: var(--blue-deep); color: #fff;
      border-radius: 2rem; padding: 0.13rem 0.5rem;
      letter-spacing: 0.04em; margin-bottom: 0.38rem; display: inline-block;
    }
    .fc-badge.rep-coral  { background: var(--coral); }
    .fc-badge.rep-green  { background: var(--green); }
    .fc-country { font-size: 0.68rem; color: rgba(44,44,44,0.45); margin-bottom: 0.28rem; }
    .fc-title {
      font-size: 0.8rem; font-weight: 400; color: var(--ink); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Carousel nav */
    .carousel-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; padding: 1.3rem 0 0.5rem;
    }
    .cnav-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(44,44,44,0.2);
      background: transparent; color: rgba(44,44,44,0.45);
      font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; line-height: 1;
    }
    .cnav-btn:hover { border-color: rgba(44,44,44,0.5); color: var(--ink); }
    .cnav-dots { display: flex; gap: 0.35rem; align-items: center; }
    .cdot {
      width: 6px; height: 6px; border-radius: 3px;
      background: rgba(44,44,44,0.18); transition: all 0.26s;
    }
    .cdot.on { background: var(--ink); width: 18px; }

    /* Mobile */
    @media (max-width: 640px) {
      .hero { min-height: auto; justify-content: flex-start; padding-bottom: 4rem; }
      nav.top-nav { padding: 1rem 1.25rem; }
      .carousel-stage { height: 300px; }
      .fc { width: 160px; }
      .fc-img { height: 160px; }
      .fc[data-pos="left"]  { transform: translateX(-130px) rotate(-13deg) scale(0.83); }
      .fc[data-pos="right"] { transform: translateX(130px)  rotate(13deg)  scale(0.83); }
      .fc-title { font-size: 0.72rem; }
      .fc-country { font-size: 0.62rem; }
      /* Filter: countries wrap to ~2 rows, themes only first 5 */
      .filter-inner { max-width: none; }
      #countryRow {
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 0.28rem;
      }
      #countryRow .chip { font-size: 0.67rem; padding: 0.22rem 0.58rem; }
      #themeRow { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; }
      #themeRow .chip:nth-child(n+7) { display: none; } /* 全部 + 前5个主题 */
      .hstar { display: none; }
    }

    /* ══════════════════════════════════════
       CONTENT — cream section
    ══════════════════════════════════════ */
    .content { background: var(--cream); padding-bottom: 7rem; }

    /* Filter bar */
    .filter-bar {
      position: sticky; top: 0; z-index: 20;
      background: rgba(247,243,236,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(44,44,44,0.07);
      padding: 0.72rem 1.25rem 0.65rem;
    }
    .filter-inner {
      max-width: 760px; margin: 0 auto;
    }
    .filter-row {
      display: flex; gap: 0.36rem; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      justify-content: center; flex-wrap: wrap;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-row + .filter-row { margin-top: 0.4rem; }
    .chip {
      flex: 0 0 auto;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.71rem; font-weight: 300;
      color: var(--ink); opacity: 0.44;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(44,44,44,0.1);
      border-radius: 2rem; padding: 0.25rem 0.7rem;
      cursor: pointer; white-space: nowrap;
      transition: all 0.17s;
    }
    .chip:hover { opacity: 0.74; }
    .chip.active {
      background: var(--ink); color: var(--cream);
      opacity: 1; border-color: transparent;
    }
    /* Theme row — slightly lighter bg */
    #themeRow .chip:not(.active) { background: transparent; }
    /* City row (L2 — hidden until country selected) */
    #cityRow { display: none; }
    #cityRow.visible { display: flex; }
    #cityRow .chip:not(.active) { background: transparent; }
    #cityRow .chip.active { background: var(--blue-light); color: var(--blue-deep); border-color: var(--blue); }

    /* Article grid */
    .articles-wrap { max-width: 980px; margin: 0 auto; padding: 1.2rem 1.1rem 0; }
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.88rem;
    }
    @media (min-width: 680px) {
      .articles-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* Article card */
    .article-card {
      background: #fff; border-radius: 1rem; overflow: hidden;
      border: 1px solid rgba(44,44,44,0.05);
      box-shadow: 0 2px 12px rgba(44,44,44,0.052);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      text-decoration: none; color: inherit; display: block;
    }
    .article-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(44,44,44,0.1);
    }
    .card-img-wrap {
      width: 100%; aspect-ratio: 1 / 1; overflow: hidden; position: relative;
      background: linear-gradient(135deg, var(--blue-lt) 0%, rgba(155,139,196,0.1) 100%);
    }
    .card-img-wrap img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition: transform 0.4s ease;
    }
    .article-card:hover .card-img-wrap img { transform: scale(1.05); }
    .card-body { padding: 0.68rem 0.85rem 0.78rem; }
    .card-loc {
      font-size: 0.63rem; color: var(--ink); opacity: 0.38;
      letter-spacing: 0.02em; margin-bottom: 0.3rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-title {
      font-size: 0.82rem; font-weight: 400; color: var(--ink);
      line-height: 1.6; margin-bottom: 0.38rem;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-date { font-size: 0.6rem; color: var(--ink); opacity: 0.26; }

    /* Skeleton */
    @keyframes shimmer {
      0%  { background-position:  200% 0; }
      100%{ background-position: -200% 0; }
    }
    .skel { background:#fff; border-radius:1rem; overflow:hidden; }
    .skel-sq {
      aspect-ratio:1; width:100%;
      background: linear-gradient(90deg,#ede9e0 25%,#e6e1d8 50%,#ede9e0 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite;
    }
    .skel-body { padding:0.68rem 0.85rem; }
    .skel-line {
      height:0.62rem; border-radius:0.3rem; margin-bottom:0.4rem;
      background: linear-gradient(90deg,#ede9e0 25%,#e6e1d8 50%,#ede9e0 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite;
    }
    .skel-line.w70{width:70%} .skel-line.w45{width:45%;margin:0}

    /* State */
    .state-msg {
      grid-column:1/-1; text-align:center;
      padding:4rem 1rem;
      font-size:0.82rem; color:var(--ink); opacity:0.32;
      letter-spacing:0.05em; line-height:2.2;
    }

    /* ══════════════════════════════════════
       BOTTOM NAV
    ══════════════════════════════════════ */
    .site-nav {
      position: fixed; bottom: 1.4rem; left: 50%;
      transform: translateX(-50%);
      z-index: 50; display: flex; align-items: center;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 3rem; padding: 0.28rem;
      gap: 0.08rem;
      box-shadow: 0 4px 28px rgba(44,44,44,0.1);
    }
    .site-nav a {
      padding: 0.38rem 0.82rem; border-radius: 2.5rem;
      text-decoration: none; color: var(--ink); opacity: 0.42;
      font-family: 'Noto Sans SC', sans-serif; font-size: 0.74rem; font-weight: 300;
      letter-spacing: 0.02em; white-space: nowrap; transition: all 0.18s;
    }
    .site-nav a:hover { opacity: 0.78; }
    .site-nav a.active { background: var(--ink); color: var(--cream); opacity: 1; }
    @media (max-width: 600px) {
      .site-nav { gap: 0.04rem; padding: 0.2rem 0.28rem; }
      .site-nav a { font-size: 0.71rem; padding: 0.34rem 0.52rem; }
    }
  </style>
</head>

  <script>
    /* ════ Typewriter ════ */
    const TITLE = "星星与七便士";
    const titleEl = document.getElementById("typewriter");
    let ci = 0;
    function typeNext() {
      if (ci < TITLE.length) {
        titleEl.textContent += TITLE[ci++];
        setTimeout(typeNext, 95 + Math.random() * 75);
      } else {
        titleEl.classList.add("typed");
      }
    }
    setTimeout(typeNext, 520);

    /* ════ Country flags ════ */
    const FLAGS = {
      "新加坡":"🇸🇬","马来西亚":"🇲🇾","印度尼西亚":"🇮🇩","中国":"🇨🇳",
      "菲律宾":"🇵🇭","老挝":"🇱🇦","文莱":"🇧🇳","越南":"🇻🇳",
      "柬埔寨":"🇰🇭","韩国":"🇰🇷","澳大利亚":"🇦🇺","美国":"🇺🇸","迪拜":"🇦🇪"
    };

    /* ════ State ════ */
    let allArticles = [];
    let activeCountry = "";
    let activeTheme   = "";
    let carouselIdx   = 0;
    let carouselItems = [];
    let autoTimer     = null;

    /* ════ Fetch ════ */
    fetch("./articles.json")
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        allArticles = Array.isArray(data) ? data : [];
        buildCarousel(allArticles);
        buildFilters(allArticles);
        renderArticles(allArticles);
      })
      .catch(() => {
        document.getElementById("articlesGrid").innerHTML =
          '<p class="state-msg">文章加载中<br/>请先生成 articles.json，或稍后再试</p>';
      });

    /* ════ Carousel ════ */
    function buildCarousel(articles) {
      // Featured 精选，合并展示，最多12张
      const featured = articles.filter(a => a.featured);
      const reps     = articles.filter(a => a.representative && !a.featured);
      let pool = [...featured, ...reps].slice(0, 12);
      if (!pool.length) pool = articles.slice(0, 8);
      carouselItems = pool;

      const stage = document.getElementById("carouselStage");
      const dotsEl = document.getElementById("navDots");
      stage.innerHTML = "";
      dotsEl.innerHTML = "";

      const REP_COLORS = ['coral', 'green'];
      let repIdx = 0;
      pool.forEach((a, i) => {
        // Card
        const card = document.createElement("article");
        card.className = "fc";
        card.dataset.pos = posFor(i, 0, pool.length);

        const flag    = FLAGS[a.country] ? FLAGS[a.country] + " " : "";
        const locParts = [a.country, a.city].filter(Boolean);
        const locStr  = flag + locParts.join(" · ");
        const imgHTML = a.cover_img
          ? `<img src="${h(a.cover_img)}" alt="${h(a.title)}" loading="lazy" referrerpolicy="no-referrer"
                  onerror="this.parentNode.innerHTML='<div class=fc-placeholder><span>✦</span></div>'" />`
          : '<div class="fc-placeholder"><span>✦</span></div>';
        const badgeClass = a.featured ? '' : ` rep-${REP_COLORS[repIdx++ % 2]}`;
        const badge = a.hero_label
          ? `<span class="fc-badge${badgeClass}">${h(a.hero_label)}</span><br>`
          : "";

        card.innerHTML =
          `<div class="fc-img">${imgHTML}</div>` +
          `<div class="fc-body">${badge}` +
          `<p class="fc-country">${h(locStr)}</p>` +
          `<h3 class="fc-title">${h(a.title)}</h3></div>`;

        card.addEventListener("click", () => {
          if (card.dataset.pos === "center") {
            window.open(a.url, "_blank", "noopener");
          } else {
            goTo(carouselItems.indexOf(a));
          }
        });
        stage.appendChild(card);

        // Dot
        const dot = document.createElement("span");
        dot.className = "cdot" + (i === 0 ? " on" : "");
        dotsEl.appendChild(dot);
      });

      document.getElementById("prevBtn").addEventListener("click", () => goTo(carouselIdx - 1));
      document.getElementById("nextBtn").addEventListener("click", () => goTo(carouselIdx + 1));

      startAutoPlay();
    }

    function posFor(cardIdx, curIdx, N) {
      const offset = ((cardIdx - curIdx) % N + N) % N;
      if (offset === 0) return "center";
      if (offset === 1) return "right";
      if (N > 2 && offset === N - 1) return "left";
      return "hidden";
    }

    function goTo(idx) {
      const N = carouselItems.length;
      if (!N) return;
      carouselIdx = ((idx % N) + N) % N;
      document.querySelectorAll(".fc").forEach((c, i) => {
        c.dataset.pos = posFor(i, carouselIdx, N);
      });
      document.querySelectorAll(".cdot").forEach((d, i) => {
        d.classList.toggle("on", i === carouselIdx);
      });
    }

    function startAutoPlay() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(carouselIdx + 1), 4200);
    }

    const cw = document.querySelector(".carousel-wrap");
    if (cw) {
      cw.addEventListener("mouseenter", () => clearInterval(autoTimer));
      cw.addEventListener("mouseleave", startAutoPlay);
      cw.addEventListener("touchstart", () => clearInterval(autoTimer), { passive: true });
    }

    /* ════ Filters ════ */
    function buildFilters(articles) {
      // Countries in fixed order (only show those present in data)
      const COUNTRY_ORDER = ["中国","新加坡","马来西亚","印度尼西亚","越南","老挝","文莱","韩国","菲律宾"];
      const cSet = new Set(articles.map(a => a.country).filter(Boolean));
      const countries = COUNTRY_ORDER.filter(c => cSet.has(c));
      // Append any not in the list
      [...cSet].filter(c => !COUNTRY_ORDER.includes(c)).forEach(c => countries.push(c));

      const cRow = document.getElementById("countryRow");
      cRow.querySelector("[data-country='']").addEventListener("click", () => setCountry(""));
      countries.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.dataset.country = c;
        btn.textContent = (FLAGS[c] ? FLAGS[c] + " " : "") + c;
        btn.addEventListener("click", () => setCountry(c));
        cRow.appendChild(btn);
      });

      // Themes in fixed order, only show those present in data
      const THEME_ORDER = ["游记","文化","美食","生活","商业","交通","峇峇娘惹","华人文化","博物馆","世界文化遗产"];
      const themeSet = new Set();
      articles.forEach(a => {
        (a.themes  || []).forEach(t => themeSet.add(t));
        (a.subtags || []).forEach(t => themeSet.add(t));
      });
      const themes = THEME_ORDER.filter(t => themeSet.has(t));

      const tRow = document.getElementById("themeRow");
      tRow.querySelector("[data-theme='']").addEventListener("click", () => setTheme(""));
      themes.forEach(t => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.dataset.theme = t;
        btn.textContent = t;
        btn.addEventListener("click", () => setTheme(t));
        tRow.appendChild(btn);
      });
    }

    /* 城市白名单（排除省份/跨国标签噪声） */
    const CITY_MAP = {
      '中国':       ['上海', '杭州', '昆明', '大理', '西双版纳', '南宁'],
      '马来西亚':   ['吉隆坡', '槟城', '马六甲', '怡保', '太平', '亚庇', '古晋'],
      '印度尼西亚': ['雅加达', '巴厘岛', '日惹', '万隆'],
      '菲律宾':     ['马尼拉', '宿务', '薄荷岛'],
      '老挝':       ['琅勃拉邦', '万象'],
      '越南':       ['胡志明', '会安', '河内'],
    };
    /* 文莱、新加坡、韩国不展开城市行 */

    let activeCity = "";

    function buildCityRow(country) {
      const row = document.getElementById("cityRow");
      row.innerHTML = "";
      const cities = (CITY_MAP[country] || []).filter(city =>
        allArticles.some(a => a.country === country && a.city && a.city.includes(city))
      );
      if (!cities.length) { row.classList.remove("visible"); return; }

      const allBtn = document.createElement("button");
      allBtn.className = "chip active";
      allBtn.dataset.city = "";
      allBtn.textContent = "全部城市";
      allBtn.addEventListener("click", () => setCity(""));
      row.appendChild(allBtn);

      cities.forEach(city => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.dataset.city = city;
        btn.textContent = city;
        btn.addEventListener("click", () => setCity(city));
        row.appendChild(btn);
      });
      row.classList.add("visible");
    }

    function setCity(city) {
      activeCity = city;
      document.querySelectorAll("#cityRow .chip").forEach(b =>
        b.classList.toggle("active", b.dataset.city === city)
      );
      applyFilter();
    }

    function setCountry(c) {
      activeCountry = c;
      activeCity = "";
      document.querySelectorAll("#countryRow .chip").forEach(b =>
        b.classList.toggle("active", b.dataset.country === c)
      );
      if (c) {
        buildCityRow(c);
      } else {
        const row = document.getElementById("cityRow");
        row.innerHTML = ""; row.classList.remove("visible");
      }
      applyFilter();
    }

    function setTheme(t) {
      activeTheme = t;
      document.querySelectorAll("#themeRow .chip").forEach(b =>
        b.classList.toggle("active", b.dataset.theme === t)
      );
      applyFilter();
    }

    /* AND logic: country + city + theme 三层独立过滤 */
    function applyFilter() {
      const result = allArticles.filter(a => {
        const cOk = !activeCountry || a.country === activeCountry;
        const cityOk = !activeCity || (a.city && a.city.includes(activeCity));
        const tOk = !activeTheme ||
          (a.themes  || []).includes(activeTheme) ||
          (a.subtags || []).includes(activeTheme);
        return cOk && cityOk && tOk;
      });
      renderArticles(result);
    }

    /* ════ Render ════ */
    function renderArticles(articles) {
      const grid = document.getElementById("articlesGrid");
      if (!articles.length) {
        grid.innerHTML = '<p class="state-msg">暂无相关文章</p>';
        return;
      }
      grid.innerHTML = articles.map(cardHTML).join("");
    }

    function cardHTML(a) {
      const dateStr = (a.pub_date || "").replace(/\s\d{1,2}:\d{2}.*$/, "").trim();
      const flag    = FLAGS[a.country] || "";
      const locParts = [flag + " " + (a.country || ""), a.city].map(s => s.trim()).filter(Boolean);
      const themes  = (a.themes || []).join(" · ");
      const locLine = [locParts.join(" · "), themes].filter(Boolean).join("  |  ");

      const imgHTML = a.cover_img
        ? `<img src="${h(a.cover_img)}" alt="${h(a.title)}" loading="lazy" referrerpolicy="no-referrer"
                onerror="this.style.display='none'" />`
        : "";

      return `<a class="article-card"
            href="${h(a.url)}" target="_blank" rel="noopener"
            aria-label="${h(a.title)}">
          <div class="card-img-wrap">${imgHTML}</div>
          <div class="card-body">
            <p class="card-loc">${h(locLine)}</p>
            <h3 class="card-title">${h(a.title)}</h3>
            <p class="card-date">${h(dateStr)}</p>
          </div>
        </a>`;
    }

    /* XSS escape */
    function h(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
