<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星星与七便士 · withchen</title>
  <meta name="description" content="郑忱的公众号文章 · 旅行、艺术、人文、心理的观察与书写" />
  <meta property="og:title" content="星星与七便士 · withchen" />
  <meta property="og:description" content="旅行 · 艺术 · 人文 · 心理" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://withchen.com/articles.html" />
  <link rel="preconnect" href="https://fonts.loli.net" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.loli.net/css2?family=Caveat:wght@400;600&family=Noto+Sans+SC:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:       #74B9E8;
      --blue-deep:  #4A9BD4;
      --blue-light: #D0E9F7;
      --cream:      #F7F3EC;
      --ink:        #2C2C2C;
      --green:      #8BBF9F;
      --coral:      #E8734A;
      --purple:     #9B8BC4;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream); color: var(--ink);
      min-height: 100vh;
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      font-weight: 300; overflow-x: hidden;
    }

    /* ── Top nav ── */
    nav.top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 1.25rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(247,243,236,0.88);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .nav-logo { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--ink); text-decoration: none; opacity: 0.55; transition: opacity 0.2s; }
    .nav-logo:hover { opacity: 0.9; }
    .nav-back { font-size: 0.75rem; color: var(--ink); text-decoration: none; opacity: 0.35; letter-spacing: 0.15em; transition: opacity 0.2s; }
    .nav-back:hover { opacity: 0.7; }

    /* ── Background sparkles ── */
    .bg-sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .sparkle { position: absolute; color: var(--blue); animation: twinkle 3s ease-in-out infinite; }
    .sparkle:nth-child(1) { top:  8%; left:  6%; font-size: 0.9rem; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 15%; left: 92%; font-size: 0.6rem; animation-delay: 1.2s; }
    .sparkle:nth-child(3) { top: 55%; left:  3%; font-size: 0.7rem; animation-delay: 1.7s; }
    .sparkle:nth-child(4) { top: 80%; left: 94%; font-size: 0.8rem; animation-delay: 0.6s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.12; transform: scale(0.85) rotate(0deg); }
      50%       { opacity: 0.4;  transform: scale(1.25) rotate(12deg); }
    }

    /* ── Main layout ── */
    main {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      padding: 7rem 1.5rem 8rem;
    }

    /* ── Fade-up animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade { opacity: 0; animation: fadeUp 0.8s ease forwards; }
    .d1{animation-delay:0.10s} .d2{animation-delay:0.25s}
    .d3{animation-delay:0.40s} .d4{animation-delay:0.55s}

    /* ── Hero / typewriter ── */
    .chapter-tag {
      font-family: 'Caveat', cursive; font-size: 0.85rem; font-weight: 600;
      color: var(--blue-deep); letter-spacing: 0.1em;
      margin-bottom: 0.9rem; display: block;
    }
    .hero-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 600; color: var(--ink);
      line-height: 1.2; margin-bottom: 0.6rem;
      min-height: 1.35em;
    }
    /* blinking cursor while typing */
    .hero-title:not(.typed)::after {
      content: '|';
      color: var(--blue-deep);
      margin-left: 2px;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .hero-sub {
      font-size: 0.8rem; font-weight: 300;
      color: var(--ink); opacity: 0.38;
      letter-spacing: 0.14em; margin-bottom: 2.5rem;
    }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex; flex-wrap: wrap; gap: 0.45rem;
      margin-bottom: 1.75rem;
    }
    .tab {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.76rem; font-weight: 300;
      color: var(--ink); opacity: 0.42;
      background: #fff;
      border: 1px solid rgba(44,44,44,0.1);
      border-radius: 2rem; padding: 0.3rem 0.88rem;
      cursor: pointer; transition: all 0.18s;
      letter-spacing: 0.04em;
    }
    .tab:hover { opacity: 0.72; }
    .tab.active {
      background: var(--ink); color: var(--cream);
      opacity: 1; border-color: transparent;
    }

    /* ── Article grid ── */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (max-width: 420px) {
      .articles-grid { grid-template-columns: 1fr; }
    }

    /* ── Article card ── */
    .article-card {
      background: #fff; border-radius: 1.1rem;
      overflow: hidden; cursor: pointer;
      box-shadow: 0 2px 16px rgba(44,44,44,0.06);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .article-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(44,44,44,0.11);
    }
    /* cover 16:9 */
    .card-cover {
      position: relative;
      padding-bottom: 56.25%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--blue-light), rgba(155,139,196,0.12));
    }
    .card-cover img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .article-card:hover .card-cover img { transform: scale(1.05); }
    .cover-placeholder {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--blue-light) 0%, rgba(155,139,196,0.12) 100%);
    }
    .card-tags {
      position: absolute; top: 0.55rem; left: 0.55rem;
      display: flex; gap: 0.28rem; flex-wrap: wrap;
    }
    .cat-tag {
      font-size: 0.6rem; font-weight: 400;
      background: rgba(255,255,255,0.92);
      color: var(--ink); border-radius: 2rem;
      padding: 0.16rem 0.52rem; letter-spacing: 0.05em;
    }
    .featured-tag {
      font-size: 0.6rem; font-weight: 400;
      background: var(--blue-deep); color: #fff;
      border-radius: 2rem; padding: 0.16rem 0.52rem;
      letter-spacing: 0.04em;
    }
    /* card body */
    .card-body { padding: 0.8rem 0.95rem 0.9rem; }
    .card-title {
      font-size: 0.86rem; font-weight: 400;
      color: var(--ink); line-height: 1.6;
      margin-bottom: 0.45rem;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-excerpt {
      font-size: 0.74rem; font-weight: 300;
      color: var(--ink); opacity: 0.42;
      line-height: 1.65; margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-date {
      font-size: 0.66rem; font-weight: 300;
      color: var(--ink); opacity: 0.28; letter-spacing: 0.02em;
    }
    .card-arrow {
      font-size: 0.78rem; color: var(--blue-deep); opacity: 0.5;
      transition: transform 0.18s, opacity 0.18s;
    }
    .article-card:hover .card-arrow { transform: translateX(3px); opacity: 1; }

    /* ── Skeleton loading ── */
    @keyframes shimmer {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card {
      background: #fff; border-radius: 1.1rem; overflow: hidden;
      box-shadow: 0 2px 16px rgba(44,44,44,0.05);
    }
    .skeleton-cover {
      padding-bottom: 56.25%;
      background: linear-gradient(90deg, #eee9e0 25%, #e4dfd6 50%, #eee9e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-body { padding: 0.8rem 0.95rem; }
    .skeleton-line {
      height: 0.72rem; border-radius: 0.36rem; margin-bottom: 0.48rem;
      background: linear-gradient(90deg, #eee9e0 25%, #e4dfd6 50%, #eee9e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w40 { width: 40%; margin-bottom: 0; }

    /* ── State messages ── */
    .state-msg {
      grid-column: 1 / -1; text-align: center;
      padding: 4rem 1rem;
      font-size: 0.85rem; font-weight: 300;
      color: var(--ink); opacity: 0.35; letter-spacing: 0.05em;
      line-height: 2;
    }

    /* ── Bottom nav ── */
    .site-nav {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      z-index: 50; display: flex; align-items: center;
      width: fit-content;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 3rem; padding: 0.3rem; gap: 0.1rem;
      box-shadow: 0 4px 28px rgba(44,44,44,0.1);
    }
    .site-nav a {
      display: flex; align-items: center; gap: 0.25rem;
      padding: 0.4rem 0.85rem; border-radius: 2.5rem;
      text-decoration: none; color: var(--ink); opacity: 0.45;
      font-family: 'Noto Sans SC', sans-serif; font-size: 0.75rem; font-weight: 300;
      letter-spacing: 0.02em; white-space: nowrap; transition: all 0.2s;
    }
    .site-nav a:hover { opacity: 0.8; }
    .site-nav a.active { background: var(--ink); color: var(--cream); opacity: 1; }
    @media (max-width: 600px) {
      .site-nav { gap: 0.05rem; padding: 0.22rem 0.3rem; }
      .site-nav a { font-size: 0.72rem; padding: 0.36rem 0.55rem; }
    }

    footer {
      position: relative; z-index: 1; text-align: center;
      padding: 1rem 1rem 6rem;
      font-size: 0.7rem; color: var(--ink); opacity: 0.18; letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="bg-sparkles">
    <span class="sparkle">✦</span><span class="sparkle">✦</span>
    <span class="sparkle">✦</span><span class="sparkle">✦</span>
  </div>

  <nav class="top-nav">
    <a href="index.html" class="nav-logo">withchen</a>
    <a href="index.html" class="nav-back">← 回到首页</a>
  </nav>

  <main>

    <div class="fade d1">
      <span class="chapter-tag">公众号文章</span>
      <h1 class="hero-title" id="typewriter"></h1>
    </div>
    <p class="hero-sub fade d2">旅行 · 艺术 · 人文 · 心理</p>

    <div class="filter-tabs fade d3" id="filterTabs">
      <button class="tab active" data-cat="all">全部</button>
    </div>

    <div class="articles-grid fade d4" id="articlesGrid">
      <!-- skeleton placeholders while loading -->
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
    </div>

  </main>

  <footer>星星与七便士 · 郑忱</footer>

  <nav class="site-nav">
    <a href="index.html">首页</a>
    <a href="about.html">我</a>
    <a href="articles.html" class="active">文章</a>
    <a href="podcast.html">播客</a>
    <a href="theater.html">思考</a>
    <a href="consult.html">咨询</a>
  </nav>

  <script>
    /* ════════ Typewriter ════════ */
    const TITLE = "星星与七便士";
    const titleEl = document.getElementById("typewriter");
    let ci = 0;
    function typeNext() {
      if (ci < TITLE.length) {
        titleEl.textContent += TITLE[ci++];
        setTimeout(typeNext, 100 + Math.random() * 70);
      } else {
        titleEl.classList.add("typed");
      }
    }
    setTimeout(typeNext, 480);

    /* ════════ Data ════════ */
    let allArticles = [];

    fetch("./articles.json")
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        allArticles = Array.isArray(data) ? data : [];
        buildTabs(allArticles);
        renderArticles(allArticles);
      })
      .catch(() => {
        document.getElementById("articlesGrid").innerHTML =
          `<p class="state-msg">文章加载中<br/>请先运行脚本生成 articles.json，或稍后再试</p>`;
      });

    /* ════════ Filter tabs ════════ */
    function buildTabs(articles) {
      const cats = [...new Set(articles.map(a => a.category).filter(Boolean))];
      if (!cats.length) return;
      const container = document.getElementById("filterTabs");
      // wire up "全部" button
      container.querySelector('[data-cat="all"]').addEventListener("click", () => filterBy("all"));
      cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "tab";
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.addEventListener("click", () => filterBy(cat));
        container.appendChild(btn);
      });
    }

    function filterBy(cat) {
      document.querySelectorAll(".tab").forEach(t =>
        t.classList.toggle("active", t.dataset.cat === cat)
      );
      const list = cat === "all" ? allArticles : allArticles.filter(a => a.category === cat);
      renderArticles(list);
    }

    /* ════════ Render cards ════════ */
    function renderArticles(articles) {
      const grid = document.getElementById("articlesGrid");
      if (!articles.length) {
        grid.innerHTML = `<p class="state-msg">暂无文章</p>`;
        return;
      }
      grid.innerHTML = articles.map(cardHTML).join("");
    }

    function cardHTML(a) {
      const dateStr = (a.pub_date || "").replace(/\s\d{1,2}:\d{2}$/, "");
      const catTag      = a.category ? `<span class="cat-tag">${h(a.category)}</span>` : "";
      const featuredTag = a.featured  ? `<span class="featured-tag">✦ 精选</span>` : "";
      const excerpt     = a.content_text
        ? h(a.content_text.trim().replace(/\s+/g, " ").slice(0, 58)) + "…"
        : "";
      const coverHTML = a.cover_img
        ? `<img src="${h(a.cover_img)}" alt="${h(a.title)}" loading="lazy"
               onerror="this.outerHTML='<div class=cover-placeholder></div>'" />`
        : `<div class="cover-placeholder"></div>`;

      return `<article class="article-card"
          onclick="window.open('${h(a.url)}','_blank')"
          role="link" tabindex="0"
          onkeydown="if(event.key==='Enter')window.open('${h(a.url)}','_blank')"
          aria-label="${h(a.title)}">
        <div class="card-cover">
          ${coverHTML}
          <div class="card-tags">${featuredTag}${catTag}</div>
        </div>
        <div class="card-body">
          <h3 class="card-title">${h(a.title)}</h3>
          ${excerpt ? `<p class="card-excerpt">${excerpt}</p>` : ""}
          <div class="card-meta">
            <span class="card-date">${h(dateStr)}</span>
            <span class="card-arrow">→</span>
          </div>
        </div>
      </article>`;
    }

    /* XSS-safe escaping */
    function h(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>

</body>
</html>
