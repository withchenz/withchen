<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>方案B改 — 学派×取向纯粹性 分组横条</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root { --bg:#ede9e1;--paper:#f7f4ee;--text:#1a1815;--text-mid:#4a4640;--text-light:#9a9590;--rule:#d4cfc6;--red:#e07070;--gold:#d4a847;--sage:#7aaa8a;--blue:#6a9ab8;--lav:#9b8dc4; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Work Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;}
  .card{background:var(--paper);border:1px solid var(--rule);box-shadow:3px 3px 0 var(--rule);padding:48px 56px;max-width:860px;width:100%;}
  .label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--red);text-transform:uppercase;margin-bottom:8px;}
  h2{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--text);margin-bottom:6px;}
  .sub{font-size:14px;color:var(--text-light);margin-bottom:28px;}
  .rule{height:2px;background:var(--text);margin-bottom:28px;}
  #chart{width:100%;height:360px;}
  .note{font-size:12px;color:var(--text-light);margin-top:16px;font-style:italic;}
</style>
</head>
<body>
<div class="card">
  <div class="label">Slide 09d · FINDINGS</div>
  <h2>学派分布 × 取向纯粹性</h2>
  <p class="sub">各学派咨询师——单独声称 vs 与其他取向混搭</p>
  <div class="rule"></div>
  <div id="chart"></div>
  <p class="note">* 混搭者中多数不自称"整合取向"，但实际列出多个取向流派</p>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  backgroundColor:'#f7f4ee',
  grid:{top:16,bottom:40,left:160,right:60},
  legend:{bottom:0,textStyle:{color:'#4a4640',fontFamily:'Work Sans',fontSize:12},itemWidth:12,itemHeight:12},
  tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'#f7f4ee',borderColor:'#d4cfc6',textStyle:{color:'#1a1815',fontFamily:'Work Sans'}},
  xAxis:{type:'value',axisLabel:{color:'#9a9590',fontSize:11},axisLine:{lineStyle:{color:'#d4cfc6'}},splitLine:{lineStyle:{color:'#d4cfc6',type:'dashed'}}},
  yAxis:{type:'category',data:['后现代/叙事','家庭/系统','CBT/认知行为','人本/存在/EFT','精神分析/动力学'],axisLabel:{color:'#4a4640',fontSize:12,fontFamily:'Work Sans'},axisLine:{show:false},axisTick:{show:false}},
  series:[
    {name:'单一取向',type:'bar',stack:'a',data:[2,14,17,29,67],itemStyle:{color:'#e07070'},barMaxWidth:28,label:{show:true,position:'inside',fontSize:11,color:'#fff',fontWeight:600}},
    {name:'双取向',type:'bar',stack:'a',data:[8,8,16,22,28],itemStyle:{color:'#e07070',opacity:0.5},barMaxWidth:28,label:{show:true,position:'inside',fontSize:11,color:'#fff',fontWeight:600,formatter:p=>p.value>5?p.value:''}},
    {name:'三取向+',type:'bar',stack:'a',data:[6,3,12,14,18],itemStyle:{color:'#e07070',opacity:0.25},barMaxWidth:28,label:{show:true,position:'inside',fontSize:11,color:'#4a4640',fontWeight:600,formatter:p=>p.value>4?p.value:''}}
  ]
});
</script>
</body>
</html>
