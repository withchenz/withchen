<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Slide 13 — 收费 × 互动量</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root{--bg:#ede9e1;--paper:#f7f4ee;--text:#1a1815;--text-mid:#4a4640;--text-light:#9a9590;--rule:#d4cfc6;--sage:#7aaa8a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Work Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;}
  .card{background:var(--paper);border:1px solid var(--rule);box-shadow:3px 3px 0 var(--rule);padding:48px 56px;max-width:860px;width:100%;}
  .label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--sage);text-transform:uppercase;margin-bottom:8px;}
  h2{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--text);margin-bottom:6px;}
  .sub{font-size:14px;color:var(--text-light);margin-bottom:8px;}
  .callout{background:#f0f7f2;border-left:3px solid var(--sage);padding:10px 16px;margin-bottom:24px;font-size:13px;color:var(--text-mid);font-style:italic;}
  .rule{height:2px;background:var(--text);margin-bottom:28px;}
  #chart{width:100%;height:360px;}
  .note{font-size:12px;color:var(--text-light);margin-top:12px;}
</style>
</head>
<body>
<div class="card">
  <div class="label">Slide 13 · FINDINGS — 什么帖子更受欢迎？</div>
  <h2>收费越高，互动越多</h2>
  <p class="sub">收费区间 × 中位互动量（点赞+收藏+评论）</p>
  <div class="callout">400元+的咨询师，中位互动量是≤99元的 <strong>4.6倍</strong> ——"贵"不是门槛，是信号</div>
  <div class="rule"></div>
  <div id="chart"></div>
  <p class="note">N=137条（含纯数字收费）· 互动量=点赞+收藏+评论 · 柱高为中位数，排除极端值影响</p>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));
const labels = ['≤99元\n(N=25)','100–199元\n(N=40)','200–299元\n(N=21)','300–399元\n(N=28)','400元+\n(N=23)'];
const medians = [10, 20, 28, 46.5, 46];
const means   = [21.1, 32.8, 73.0, 84.5, 129.3];
chart.setOption({
  backgroundColor:'#f7f4ee',
  grid:{top:40,bottom:60,left:60,right:40},
  tooltip:{trigger:'axis',backgroundColor:'#f7f4ee',borderColor:'#d4cfc6',textStyle:{color:'#1a1815',fontFamily:'Work Sans'},formatter:p=>`${p[0].name.replace('\n','')}<br>中位数：${p[0].value}<br>均值：${means[p[0].dataIndex]}`},
  xAxis:{type:'category',data:labels,axisLabel:{color:'#4a4640',fontSize:12,fontFamily:'Work Sans',lineHeight:18},axisLine:{lineStyle:{color:'#d4cfc6'}},axisTick:{show:false}},
  yAxis:{type:'value',name:'中位互动量',nameTextStyle:{color:'#9a9590',fontSize:11},axisLabel:{color:'#9a9590',fontSize:11},axisLine:{show:false},splitLine:{lineStyle:{color:'#d4cfc6',type:'dashed'}}},
  series:[{
    type:'bar',data:medians,barMaxWidth:52,
    itemStyle:{color:(p)=>{const c=['#d4cfc6','#bdd4c0','#9dc4aa','#7aaa8a','#5a9070'];return c[p.dataIndex];}},
    label:{show:true,position:'top',formatter:p=>p.value,fontSize:14,fontWeight:700,color:'#1a1815',fontFamily:'Fraunces, serif'}
  }]
});
</script>
</body>
</html>
