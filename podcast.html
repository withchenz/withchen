    const FEATURED_NUMS = [16, 5, 6, 10];
    let featIdx = 0;

    function numStr(n) { return n < 10 ? '0' + n : '' + n; }

    /* ── Hero ── */
    function renderHero() {
      const ep    = EPISODES.find(e => e.num === FEATURED_NUMS[featIdx]);
      const ns    = numStr(ep.num);
      const card  = document.getElementById('hero-card');
      const thumb = document.getElementById('hero-thumb');

      card.style.opacity = '0';
      setTimeout(() => {
        card.href = ep.url;
        if (ep.num >= 4) {
          thumb.innerHTML = `<img src="podcastsimg/EP${ns}.jpg" alt="EP${ns}" />`;
        } else {
          const col = CAT_COLORS[ep.cat] || 'color-blue';
          thumb.innerHTML = `<div class="hero-thumb-grad ${col}"><span class="hero-thumb-num">${ns}</span></div>`;
        }
        document.getElementById('hero-ep').textContent    = `EP ${ns}`;
        document.getElementById('hero-title').textContent = ep.title;
        document.getElementById('hero-dur').textContent   = ep.dur;
        document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === featIdx));
        card.style.transition = 'opacity 0.25s ease';
        card.style.opacity = '1';
      }, 150);
    }

    function initHero() {
      renderHero();
      document.getElementById('hero-prev').addEventListener('click', () => {
        featIdx = (featIdx - 1 + FEATURED_NUMS.length) % FEATURED_NUMS.length;
        renderHero();
      });
      document.getElementById('hero-next').addEventListener('click', () => {
        featIdx = (featIdx + 1) % FEATURED_NUMS.length;
        renderHero();
      });
      document.querySelectorAll('.hero-dot').forEach((d, i) => {
        d.addEventListener('click', () => { featIdx = i; renderHero(); });
      });
    }

    /* ── Episode list ── */
    function buildList(episodes) {
      const list = document.getElementById('ep-list');
      list.innerHTML = '';
      episodes.forEach((ep, i) => {
        const color = CAT_COLORS[ep.cat] || 'color-blue';
        const ns = numStr(ep.num);
        const li = document.createElement('li');
        li.innerHTML = `
          <a class="ep-row ${color}" href="${ep.url}" target="_blank">
            <div class="ep-num">EP${ns}</div>
            <div class="ep-info">
              <div class="ep-list-title">${ep.title}</div>
              <div class="ep-list-dur">${ep.dur}</div>
            </div>
            <span class="ep-arrow">收听 →</span>
          </a>
          ${i < episodes.length - 1 ? '<div class="ep-divider"></div>' : ''}`;
        list.appendChild(li);
      });
    }

    /* ── Category header ── */
    function updateCatHeader(cat) {
      const header = document.getElementById('cat-header');
      if (!cat || cat === 'all' || !CATEGORIES[cat]) { header.style.display = 'none'; return; }
      document.getElementById('cat-title').textContent = CATEGORIES[cat].title;
      document.getElementById('cat-desc').textContent  = CATEGORIES[cat].desc;
      header.style.display = 'block';
    }

    /* ── Pills ── */
    function initPills() {
      document.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', () => {
          document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          const cat = pill.dataset.cat;
          updateCatHeader(cat);
          buildList(cat === 'all' ? EPISODES : EPISODES.filter(e => e.cat === cat));
        });
      });
    }

    window.addEventListener('load', () => {
      initHero();
      buildList(EPISODES);
      initPills();
    });
  </script>
